name: Release APK

# Triggered when a tag matching `v*` is pushed (e.g. `v0.1.0-beta`, `v1.2.3`).
# The workflow builds a signed release APK and publishes it as a GitHub Release
# with auto-generated changelog from the commits since the previous tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64        — the stash-release.jks file base64-encoded
#   KEYSTORE_PASSWORD      — store password for the keystore
#   KEY_ALIAS              — alias of the signing key (usually "stash")
#   KEY_PASSWORD           — password for the signing key inside the keystore

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub Release and upload assets

jobs:
  build-release:
    name: Build and publish signed release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for changelog generation

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See SECURITY.md and README for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/stash-release.jks"
          echo "Decoded keystore to $RUNNER_TEMP/stash-release.jks"
          ls -la "$RUNNER_TEMP/stash-release.jks"

      - name: Fetch qbdlx token pool
        env:
          QBDLX_TOKEN_POOL_SECRET: ${{ secrets.QBDLX_TOKEN_POOL }}
        run: |
          # Fetch the CURRENT shared pool so every release ships live tokens.
          # Reachable from datacenter IPs (verified). Any failure → fall back to
          # the QBDLX_TOKEN_POOL secret; the build must NEVER break on this.
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          POOL=$(curl -sf -A "$UA" \
                   -H "Origin: https://qbdlx.launchpd.cloud" \
                   -H "Referer: https://qbdlx.launchpd.cloud/" \
                   https://citegptapi.f5.si/webhook/qbdlx/shared \
                 | jq -r '[.[] | select(.token!=null and .token!="" and (.app_id|tostring)=="798273057"
                          and .country!=null and .country!="")]
                          | unique_by(.token) | map(.token+":"+.country) | join(",")' 2>/dev/null) || POOL=""
          if [ -n "$POOL" ]; then
            echo "Fetched $(echo "$POOL" | tr ',' '\n' | wc -l) qbdlx tokens from the shared pool"
            echo "QBDLX_TOKEN_POOL=$POOL" >> "$GITHUB_ENV"
          else
            echo "::warning::qbdlx pool fetch failed/empty — falling back to the QBDLX_TOKEN_POOL secret"
            echo "QBDLX_TOKEN_POOL=$QBDLX_TOKEN_POOL_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Assemble release APK
        env:
          STASH_KEYSTORE_FILE: ${{ runner.temp }}/stash-release.jks
          STASH_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          STASH_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STASH_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Optional Last.fm API credentials. Missing secrets are OK —
          # the app builds fine, the Last.fm UI just shows "Not configured."
          # Set these in repo Settings → Secrets → Actions to enable the
          # scrobbler in shipped APKs:
          #   LASTFM_API_KEY     — from https://www.last.fm/api/account/create
          #   LASTFM_API_SECRET  — shared secret from the same page
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
          # Optional: route generic Last.fm reads through the Stash proxy Worker
          # (infra/lastfm-proxy) so the shared key never gets rate-limited.
          # Empty/unset = app talks to Last.fm directly. See
          # infra/lastfm-proxy/README.md.
          LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
          # Optional comma-separated extra read-key pool (raises the ceiling).
          LASTFM_EXTRA_API_KEYS: ${{ secrets.LASTFM_EXTRA_API_KEYS }}
          # ARCOD private stream endpoint (host + path). Injected from a repo
          # secret so it never lives in source; consumed by
          # data/download BuildConfig.ARCOD_STREAM_BASE. If unset, ARCOD
          # streaming simply no-ops and the registry fails over — so this MUST
          # be set for shipped APKs to stream via ARCOD.
          ARCOD_STREAM_BASE: ${{ secrets.ARCOD_STREAM_BASE }}
          # qbdlx (direct-Qobuz) app credentials, consumed by data/download
          # BuildConfig (QBDLX_*). These MUST be set: without them the shipped
          # APK has blank credentials and qbdlx is dead on arrival — exactly what
          # shipped in v0.9.65–v0.9.68 before this env existed. The token pool
          # (QBDLX_TOKEN_POOL) is NOT declared here — the "Fetch qbdlx token
          # pool" step above exports it to $GITHUB_ENV (live pool, secret
          # fallback) and Gradle inherits it. The verify step refuses to publish
          # an APK missing these.
          QBDLX_APP_ID: ${{ secrets.QBDLX_APP_ID }}
          QBDLX_APP_SECRET: ${{ secrets.QBDLX_APP_SECRET }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Locate release APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK produced by assembleRelease"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          echo "Built: $APK ($(du -h $APK | cut -f1))"

      - name: Verify bundled credentials embedded in APK
        env:
          QBDLX_APP_ID: ${{ secrets.QBDLX_APP_ID }}
          # QBDLX_TOKEN_POOL comes from $GITHUB_ENV (the fetch step) — do NOT
          # redeclare it as the secret here, or the fingerprint would be computed
          # over the secret while the dex carries the fetched pool → false-fail.
        run: |
          if [ -z "$QBDLX_APP_ID" ] || [ -z "$QBDLX_TOKEN_POOL" ]; then
            echo "::error::QBDLX_APP_ID / QBDLX_TOKEN_POOL not available"
            exit 1
          fi
          DEX_DIR="$RUNNER_TEMP/dexcheck"
          mkdir -p "$DEX_DIR"
          unzip -o -q "${{ steps.find_apk.outputs.apk_path }}" 'classes*.dex' -d "$DEX_DIR"

          # 1. app_id must be present (BuildConfig wired; still plaintext).
          if ! grep -a -q -F -- "$QBDLX_APP_ID" "$DEX_DIR"/classes*.dex; then
            echo "::error::app_id missing from APK dex — blank BuildConfig?"
            exit 1
          fi
          # 2. The plaintext first token must be ABSENT (encryption actually ran).
          FIRST_TOKEN="${QBDLX_TOKEN_POOL%%:*}"
          if grep -a -q -F -- "$FIRST_TOKEN" "$DEX_DIR"/classes*.dex; then
            echo "::error::plaintext qbdlx token found in dex — pool was NOT encrypted"
            exit 1
          fi
          # 3. The pool fingerprint must be present (current, non-blank pool shipped).
          FP=$(printf %s "$QBDLX_TOKEN_POOL" | sha256sum | head -c 8)
          if ! grep -a -q -F -- "$FP" "$DEX_DIR"/classes*.dex; then
            echo "::error::QBDLX_POOL_FP ($FP) missing from dex — stale/blank/mismatched pool"
            exit 1
          fi
          echo "qbdlx pool verified: app_id present, token encrypted, fp $FP embedded"

      - name: Rename APK for release
        id: rename_apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          NEW_NAME="Stash-${TAG}.apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "$RUNNER_TEMP/$NEW_NAME"
          echo "release_apk=$RUNNER_TEMP/$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          ls -la "$RUNNER_TEMP/$NEW_NAME"

      - name: Extract tag annotation as release body
        id: tag_body
        run: |
          # Pull the tag's annotation (git tag -a -m "...") and emit it as a
          # GITHUB_OUTPUT heredoc so multi-line notes survive. Strip any PGP
          # signature block that git may append to signed tags. Falls back
          # to an empty body if the tag has no annotation (lightweight tag).
          RAW=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          BODY=$(printf '%s' "$RAW" | sed '/^-----BEGIN PGP SIGNATURE-----/,$d')
          {
            echo 'body<<STASH_EOF'
            printf '%s\n' "$BODY"
            echo 'STASH_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Clean up keystore from runner
        if: always()
        run: |
          # Ensure the decoded keystore file is removed from the runner disk
          # regardless of whether the build succeeded or failed.
          rm -f "$RUNNER_TEMP/stash-release.jks"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stash ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          # Auto-append a "What's Changed" commit list under our custom body
          # so the raw commit history is still there if someone wants it.
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: ${{ steps.rename_apk.outputs.release_apk }}
          body: |
            ${{ steps.tag_body.outputs.body }}

            ---

            ## Install

            Download the `.apk` below and open it on your Android device. If you've got a previous Stash release installed, this upgrades in place — your library, sync history, and settings are preserved.

            **Requires:** Android 8.0 (API 26) or newer.

            See the [README](https://github.com/rawnaldclark/Stash#installation) for first-time setup.
